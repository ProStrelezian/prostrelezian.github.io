<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description"
        content="Dashboard d'archive pour suivre les résultats et le classement du tournoi ZLAN 2025.">
    <title>ZLAN 2025 - Dashboard Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="min-h-screen pb-20 overflow-x-hidden">

    <header
        class="p-2.5 md:p-3 border-b-2 border-[#27272a] mb-6 md:mb-10 bg-[#09090b]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="w-[80%] mx-auto flex flex-col md:flex-row justify-between items-center px-2 md:px-3 gap-4 md:gap-0">
            <div class="flex items-center gap-6">
                <h1 class="mt-1 flex items-center">
                    <img src="./logozlan.png" alt="ZLAN 2025" class="h-10 md:h-20 w-auto object-contain">
                </h1>
                <nav class="flex gap-4 font-pixel text-xs md:text-sm mt-1">
                    <a href="./index2025.html" class="text-[var(--pixel-green)] border-b-2 border-[var(--pixel-green)]">2025</a>
                    <a href="./index.html" class="text-slate-500 hover:text-white transition-colors">2026</a>
                </nav>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-2 md:gap-5 w-full md:w-auto">
                <div class="flex flex-wrap justify-center items-center gap-3 md:gap-5 font-text text-base md:text-xl">
                    <a href="https://zlan.fr" target="_blank" rel="noopener noreferrer"
                        class="flex items-center gap-2 text-slate-400 hover:text-[var(--pixel-green)] transition-colors group"
                        title="Site Officiel ZLAN">
                        <svg class="w-4 h-4 md:w-5 md:h-5 group-hover:text-[var(--pixel-green)] transition-colors"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/suv">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s-1.343-9-3-9m-9 9a9 9 0 019-9">
                            </path>
                        </svg>
                        <span>ZLAN.FR</span>
                    </a>

                    <a href="https://twitch.tv/theguill84" target="_blank" rel="noopener noreferrer"
                        id="link-theguill84"
                        class="flex items-center gap-2 text-slate-400 hover:text-[var(--pixel-orange)] transition-colors group"
                        title="Twitch TheGuill84">
                        <svg class="w-4 h-4 md:w-5 md:h-5 fill-current group-hover:text-[var(--pixel-orange)] transition-colors"
                            viewBox="0 0 24 24">
                            <path
                                d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z" />
                        </svg>
                        <span>THEGUILL84</span>
                        <span id="live-theguill84"
                            class="hidden flex items-center gap-1.5 bg-[#18181b] border border-[var(--pixel-red)] text-[var(--pixel-red)] text-[8px] md:text-[10px] font-pixel px-1.5 py-0.5 rounded-sm shadow-[0_0_8px_rgba(229,57,53,0.3)] tracking-widest ml-1">
                            <span
                                class="w-1.5 h-1.5 bg-[var(--pixel-red)] rounded-full animate-pulse shadow-[0_0_4px_rgba(229,57,53,1)]"></span>
                            LIVE</span>
                    </a>

                    <a href="https://twitch.tv/nykho" target="_blank" rel="noopener noreferrer" id="link-nykho"
                        class="flex items-center gap-2 text-slate-400 hover:text-[#9146FF] transition-colors group"
                        title="Twitch Nykho">
                        <svg class="w-4 h-4 md:w-5 md:h-5 fill-current group-hover:text-[#9146FF] transition-colors"
                            viewBox="0 0 24 24">
                            <path
                                d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z" />
                        </svg>
                        <span>NYKHO</span>
                        <span id="live-nykho"
                            class="hidden flex items-center gap-1.5 bg-[#18181b] border border-[var(--pixel-red)] text-[var(--pixel-red)] text-[8px] md:text-[10px] font-pixel px-1.5 py-0.5 rounded-sm shadow-[0_0_8px_rgba(229,57,53,0.3)] tracking-widest ml-1">
                            <span
                                class="w-1.5 h-1.5 bg-[var(--pixel-red)] rounded-full animate-pulse shadow-[0_0_4px_rgba(229,57,53,1)]"></span>
                            LIVE</span>
                    </a>
                </div>

                <div class="hidden md:block w-px h-6 bg-[#27272a]"></div>

                <div id="status"
                    class="font-text text-lg md:text-xl text-slate-500 flex items-center justify-center gap-2 mt-1 md:mt-0 w-full md:w-auto"
                    aria-live="polite">
                    <span class="w-3 h-3 bg-[var(--pixel-red)] animate-pulse" aria-hidden="true"></span> INIT...
                </div>
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto px-0 md:px-3 pb-12" id="dashboard-container">
        <div class="text-center py-12 md:py-24 animate-pulse font-pixel text-lg md:text-2xl lg:text-3xl leading-relaxed tracking-widest px-3 md:px-0"
            style="color: var(--pixel-green)" role="status">
            CHARGEMENT DES ARCHIVES 2025...
        </div>
    </main>

    <footer
        class="w-full text-center py-6 mt-10 border-t-2 border-[#27272a] text-slate-500 font-text text-xs md:text-sm px-3">
        <p>@2025 Strelezian - Archive ZLAN 2025. Ceci n'est pas un site officiel de la ZLAN.</p>
    </footer>

    <script src="./script2025.js"></script>
</body>

</html>
