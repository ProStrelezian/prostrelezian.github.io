                    <div class="flex flex-wrap items-center justify-center gap-3 sm:gap-4 lg:gap-6 w-full xl:w-auto">
                        <a href="./multitwitch.html" class="flex items-center gap-1.5 sm:gap-2 px-3 py-1.5 sm:px-4 sm:py-2 bg-[var(--pixel-violet)] text-white font-pixel text-[10px] sm:text-xs lg:text-sm hover:bg-white hover:text-[var(--pixel-violet)] border-2 border-[var(--pixel-violet)] transition-all duration-300 shadow-[2px_2px_0px_rgba(0,0,0,0.8)] sm:shadow-[4px_4px_0px_rgba(0,0,0,0.8)] hover:-translate-y-0.5 shrink-0">

    <main class="w-[90%] md:w-[80%] mx-auto px-0 pb-12" id="dashboard-container">

    <button id="scrollTopBtn" class="fixed bottom-6 right-6 w-12 h-12 bg-[#09090b] border-2 border-[var(--pixel-green)] text-[var(--pixel-green)] flex justify-center items-center shadow-[4px_4px_0px_rgba(0,0,0,0.8)] hover:-translate-y-1 transition-all duration-300 z-50 opacity-0 pointer-events-none" aria-label="Retour en haut">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>

    <script src="./dashboard_dev.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialisation Dashboard
            new ZlanDashboard(
                'aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMWxUUUl4cjFyYWxMUUZPekdzWThiXzNvNUZGN2N1RGROY3VEcE4xWEQyYzQvZXhwb3J0P2Zvcm1hdD1jc3YmZ2lkPTA=',
                true,
                'https://yt3.ggpht.com/zs8gmrzyEG1Sn_iUIFnS7usvq-1BTT3lYt5YsbH_Br-Jjs4Xhpr21suv5hZuaXnpkujlT6eWFT0R6Q',
                true
            );

            // Gestion Header (Show/Hide on scroll) & Mobile Menu
            let lastScroll = 0;
            const header = document.getElementById('main-header');
            const menuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('mobile-menu-icon');

            if (menuBtn && mobileMenu && menuIcon) {
                menuBtn.addEventListener('click', () => {
                    const isHidden = mobileMenu.classList.toggle('hidden');
                    mobileMenu.classList.toggle('flex', !isHidden);
                    menuIcon.setAttribute('d', isHidden ? 'M4 6h16M4 12h16M4 18h16' : 'M6 18L18 6M6 6l12 12');
                });
            }

            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                if (currentScroll > lastScroll && currentScroll > 150) {
                    header.style.transform = 'translateY(-100%)';
                } else {
                    header.style.transform = 'translateY(0)';
                }
                lastScroll = currentScroll;
            }, { passive: true });
        });
    </script>
</body>
