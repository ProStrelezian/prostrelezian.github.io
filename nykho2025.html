<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="description"
        content="Dashboard d'archive pour suivre les résultats et le classement du tournoi ZLAN 2025.">
    <title>Nykho - ZLAN 2025 - Le Récap'</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="min-h-screen pb-20 overflow-x-hidden">

    <header
        class="p-2.5 md:p-3 border-b-2 border-[#27272a] mb-6 md:mb-10 bg-[#09090b]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="w-[80%] mx-auto flex flex-col md:flex-row justify-between items-center px-2 md:px-3 gap-4 md:gap-0">
            <div class="flex items-center gap-6">
                <h1 class="mt-1 flex items-center">
                    <img src="./logozlan.png" alt="ZLAN 2025" class="h-10 md:h-20 w-auto object-contain">
                </h1>
                <nav class="flex gap-4 font-pixel text-[10px] md:text-sm mt-1">
                    <a href="./guill2025.html" class="text-slate-500 hover:text-white transition-colors"
                        title="Archive Guill 2025">GUILL 2025</a>
                    <a href="./nykho2025.html"
                        class="text-[var(--pixel-green)] border-b-2 border-[var(--pixel-green)] drop-shadow-[0_0_8px_var(--pixel-green)]"
                        title="Archive Nykho 2025">NYKHO 2025</a>
                    <a href="./index.html" class="text-slate-500 hover:text-white transition-colors">2026</a>
                </nav>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-2 md:gap-5 w-full md:w-auto">
                <div class="flex flex-wrap justify-center items-center gap-3 md:gap-5 font-text text-base md:text-xl">
                    <a href="https://zlan.fr" target="_blank" rel="noopener noreferrer"
                        class="flex items-center gap-2 text-slate-400 hover:text-[var(--pixel-green)] hover:-translate-y-0.5 hover:drop-shadow-[0_0_8px_var(--pixel-green)] transition-all duration-300 group"
                        title="Site Officiel ZLAN">
                        <svg class="w-4 h-4 md:w-5 md:h-5 group-hover:text-[var(--pixel-green)] transition-colors"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke-width="2"></circle>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 12h20"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                            </path>
                        </svg>
                        <span>ZLAN.FR</span>
                    </a>

                    <a href="https://twitch.tv/theguill84" target="_blank" rel="noopener noreferrer"
                        id="link-theguill84"
                        class="flex items-center gap-2 text-slate-400 hover:text-[var(--pixel-orange)] hover:-translate-y-0.5 hover:drop-shadow-[0_0_8px_var(--pixel-orange)] transition-all duration-300 group"
                        title="Twitch TheGuill84">
                        <svg class="w-4 h-4 md:w-5 md:h-5 fill-current group-hover:text-[var(--pixel-orange)] transition-colors"
                            viewBox="0 0 24 24">
                            <path
                                d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z" />
                        </svg>
                        <span>THEGUILL84</span>
                        <!-- Ajout du badge Live caché -->
                        <span id="live-theguill84"
                            class="hidden flex items-center gap-1.5 bg-[#18181b] border border-[var(--pixel-red)] text-[var(--pixel-red)] text-[8px] md:text-[10px] font-pixel px-1.5 py-0.5 rounded-sm shadow-[0_0_8px_rgba(229,57,53,0.3)] tracking-widest ml-1">
                            <span
                                class="w-1.5 h-1.5 bg-[var(--pixel-red)] rounded-full animate-pulse shadow-[0_0_4px_rgba(229,57,53,1)]"></span>
                            LIVE
                        </span>
                    </a>

                    <a href="https://twitch.tv/nykho" target="_blank" rel="noopener noreferrer" id="link-nykho"
                        class="flex items-center gap-2 text-slate-400 hover:text-[#9146FF] hover:-translate-y-0.5 hover:drop-shadow-[0_0_8px_#9146FF] transition-all duration-300 group"
                        title="Twitch Nykho">
                        <svg class="w-4 h-4 md:w-5 md:h-5 fill-current group-hover:text-[#9146FF] transition-colors"
                            viewBox="0 0 24 24">
                            <path
                                d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z" />
                        </svg>
                        <span>NYKHO</span>
                        <!-- Ajout du badge Live caché -->
                        <span id="live-nykho"
                            class="hidden flex items-center gap-1.5 bg-[#18181b] border border-[var(--pixel-red)] text-[var(--pixel-red)] text-[8px] md:text-[10px] font-pixel px-1.5 py-0.5 rounded-sm shadow-[0_0_8px_rgba(229,57,53,0.3)] tracking-widest ml-1">
                            <span
                                class="w-1.5 h-1.5 bg-[var(--pixel-red)] rounded-full animate-pulse shadow-[0_0_4px_rgba(229,57,53,1)]"></span>
                            LIVE
                        </span>
                    </a>
                </div>

                <div class="hidden md:block w-px h-6 bg-[#27272a]"></div>

                <div id="status"
                    class="font-text text-lg md:text-xl text-slate-500 flex items-center justify-center gap-2 mt-1 md:mt-0 w-full md:w-auto"
                    aria-live="polite">
                    <span class="w-3 h-3 bg-[var(--pixel-red)] animate-pulse" aria-hidden="true"></span> INIT...
                </div>
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto px-0 md:px-3 pb-12" id="dashboard-container">
        <div class="flex flex-col items-center justify-center py-12 md:py-24 px-3 md:px-0" role="status">
            <div class="font-pixel text-lg md:text-2xl lg:text-3xl tracking-widest mb-6 text-center drop-shadow-[0_0_8px_var(--pixel-green)]"
                style="color: var(--pixel-green)">
                CHARGEMENT DES ARCHIVES...
            </div>
            <div
                class="w-64 md:w-96 h-6 md:h-8 border-4 border-[#27272a] bg-[#09090b] relative overflow-hidden pixel-card p-1">
                <div class="h-full bg-[var(--pixel-green)] pixel-loader text-[var(--pixel-green)]"></div>
            </div>
            <div class="mt-4 font-text text-sm md:text-xl text-slate-500 animate-pulse text-center">
                DÉPOUSSIÉRAGE DES DONNÉES DE 2025... (et du trophée aussi...)
            </div>
        </div>
    </main>

    <footer
        class="w-full text-center py-6 mt-10 border-t-2 border-[#27272a] text-slate-500 font-text text-xs md:text-sm px-3">
        <p>@2025 Strelezian - Archive ZLAN 2025. Ceci n'est pas un site officiel de la ZLAN.</p>
    </footer>

    <button id="scrollTopBtn"
        class="fixed bottom-6 right-6 w-12 h-12 bg-[var(--pixel-gray)] border-2 border-[var(--pixel-green)] text-[var(--pixel-green)] flex justify-center items-center rounded-none shadow-[4px_4px_0px_rgba(0,0,0,0.8)] hover:-translate-y-1 hover:drop-shadow-[0_0_8px_var(--pixel-green)] transition-all duration-300 z-50 opacity-0 pointer-events-none"
        aria-label="Retour en haut">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path>
        </svg>
    </button>

    <script src="./dashboard.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // On passe l'URL encodée de Nykho, et false car c'est une archive (pas de Twitch en direct)
            new ZlanDashboard('aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMUVOeHdVOTVJLXJyZ1AwS3BtNkgzVHRyMzRPWEZoblFfYUNscXNNa3BuOTAvZXhwb3J0P2Zvcm1hdD1jc3YmZ2lkPTA=', false);
        });
    </script>
</body>

</html>
